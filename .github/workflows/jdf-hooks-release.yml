name: jdf-hooks Release
on:
  push:
    tags: ['jdf-hooks-v*']
jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: Generate changelog
      id: changelog
      run: |
        # Find the previous jdf-hooks tag (second in the sorted list; first is the tag that triggered this run).
        LAST_TAG=$(git tag --list 'jdf-hooks-v*' --sort=-v:refname | sed -n '2p')
        if [ -z "$LAST_TAG" ]; then
          COMMITS=$(git log --pretty=format:"- %s" --no-merges -- packages/jdf-hooks/)
        else
          COMMITS=$(git log --pretty=format:"- %s" --no-merges "${LAST_TAG}"..HEAD -- packages/jdf-hooks/)
        fi
        {
          echo "changelog<<EOF"
          echo "$COMMITS"
          echo "EOF"
        } >> "$GITHUB_OUTPUT"
    - name: Create Release
      uses: softprops/action-gh-release@v2.5.0
      with:
        name: ${{ github.ref_name }}
        body: |
          ## Changes
          ${{ steps.changelog.outputs.changelog }}
        draft: false
        prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
  publish:
    runs-on: ubuntu-latest
    needs: release
    permissions:
      id-token: write
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Install uv
      uses: astral-sh/setup-uv@v7
    - name: Build
      # Outputs to the workspace-root `dist/` (uv's default in workspaces).
      run: uv build --package jdf-hooks
    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        packages-dir: dist/
