<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Huddle — Settings</title>
  <style>
    :root {
      color-scheme: light dark;
    }

    body {
      max-width: 640px;
      margin: 0 auto;
      padding: 32px 24px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      min-height: 100vh;
      box-sizing: border-box;
    }

    h1 {
      margin: 0 0 8px 0;
      font-size: 24px;
      font-weight: 600;
    }

    .subtitle {
      margin: 0 0 32px 0;
      font-size: 14px;
      opacity: 0.8;
    }

    .section {
      background: rgba(0, 0, 0, 0.15);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .section h2 {
      margin: 0 0 8px 0;
      font-size: 16px;
      font-weight: 600;
    }

    .section p.hint {
      margin: 0 0 16px 0;
      font-size: 13px;
      opacity: 0.85;
      line-height: 1.5;
    }

    .field {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      gap: 12px;
    }

    .field:last-child {
      margin-bottom: 0;
    }

    .field label {
      flex: 1;
      font-size: 14px;
    }

    .field select,
    .field input[type="checkbox"] {
      font-size: 14px;
    }

    .field select {
      background: rgba(255, 255, 255, 0.15);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 6px;
      padding: 6px 10px;
      min-width: 120px;
    }

    .field select option {
      background: #4a4a7a;
      color: white;
    }

    .field input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }

    .status {
      min-height: 20px;
      font-size: 13px;
      opacity: 0;
      transition: opacity 0.3s ease;
      margin-top: 8px;
    }

    .status.visible {
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <h1>Huddle Settings</h1>
  <p class="subtitle">Preferences sync across your Chrome signins via <code>chrome.storage.sync</code>.</p>

  <div class="section">
    <h2>Link Clumping</h2>
    <p class="hint">Hold the activation key, then click-drag a rectangle over a page's links. On release, every link inside the rectangle opens as a new background tab next to the current one.</p>

    <div class="field">
      <label for="clumping-enabled">Enable link clumping</label>
      <input type="checkbox" id="clumping-enabled">
    </div>

    <div class="field">
      <label for="clumping-key">Activation key</label>
      <select id="clumping-key"></select>
    </div>

    <div class="field">
      <label for="clumping-modifier">Modifier</label>
      <select id="clumping-modifier">
        <option value="">None</option>
        <option value="shift">Shift</option>
        <option value="ctrl">Ctrl</option>
        <option value="alt">Alt</option>
      </select>
    </div>

    <div id="clumping-status" class="status"></div>
  </div>

  <script src="options.js"></script>
</body>
</html>
