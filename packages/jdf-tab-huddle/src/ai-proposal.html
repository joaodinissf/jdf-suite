<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>Tab Organizer - AI Grouping Proposal</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 700px;
      margin: 40px auto;
      padding: 30px;
      background: #667eea;
      color: white;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    }

    h2 {
      margin-top: 0;
      margin-bottom: 20px;
      text-align: center;
      font-size: 24px;
    }

    .loading {
      text-align: center;
      padding: 60px 0;
      font-size: 16px;
      opacity: 0.8;
    }

    .error-msg {
      background: rgba(220, 53, 69, 0.3);
      padding: 14px 18px;
      border-radius: 8px;
      text-align: center;
    }

    .group-card {
      background: rgba(255, 255, 255, 0.12);
      border-radius: 10px;
      margin-bottom: 16px;
      overflow: hidden;
    }

    .group-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.08);
    }

    .group-name {
      flex: 1;
      font-weight: 600;
      font-size: 15px;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 4px;
      border: 1px solid transparent;
      background: transparent;
      color: white;
      transition: border-color 0.2s;
    }

    .group-name:hover {
      border-color: rgba(255, 255, 255, 0.3);
    }

    .group-name:focus {
      outline: none;
      border-color: rgba(255, 255, 255, 0.6);
      background: rgba(255, 255, 255, 0.1);
    }

    .color-select {
      display: flex;
      gap: 4px;
      align-items: center;
    }

    .color-dot {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all 0.15s ease;
    }

    .color-dot:hover {
      transform: scale(1.2);
    }

    .color-dot.active {
      border-color: white;
      box-shadow: 0 0 6px rgba(255, 255, 255, 0.5);
    }

    .tab-count {
      font-size: 11px;
      opacity: 0.7;
      background: rgba(255, 255, 255, 0.15);
      padding: 2px 8px;
      border-radius: 10px;
    }

    .tab-list {
      padding: 8px 0;
    }

    .tab-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 16px;
      transition: background 0.15s;
    }

    .tab-row:hover {
      background: rgba(255, 255, 255, 0.06);
    }

    .tab-favicon {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      border-radius: 2px;
    }

    .tab-info {
      flex: 1;
      min-width: 0;
      overflow: hidden;
    }

    .tab-title {
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .tab-url {
      font-size: 11px;
      opacity: 0.6;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .tab-move {
      flex-shrink: 0;
      padding: 4px 8px;
      font-size: 11px;
      background: rgba(255, 255, 255, 0.1);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 4px;
      cursor: pointer;
    }

    .tab-move option {
      background: #667eea;
      color: white;
    }

    .actions {
      text-align: center;
      margin: 0 0 20px 0;
      display: flex;
      gap: 15px;
      justify-content: center;
    }

    button {
      padding: 14px 28px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 600;
      min-width: 150px;
      transition: all 0.2s ease;
    }

    .confirm {
      background: #28a745;
      color: white;
      box-shadow: 0 2px 8px rgba(40, 167, 69, 0.3);
    }

    .cancel {
      background: #6c757d;
      color: white;
      box-shadow: 0 2px 8px rgba(108, 117, 125, 0.3);
    }

    .confirm:hover {
      background: #218838;
      transform: translateY(-2px);
    }

    .cancel:hover {
      background: #5a6268;
      transform: translateY(-2px);
    }

    .debug-toggle {
      display: block;
      margin: 20px auto 0;
      background: none;
      border: none;
      color: rgba(255, 255, 255, 0.5);
      font-size: 11px;
      cursor: pointer;
      padding: 4px 8px;
      min-width: auto;
    }

    .debug-toggle:hover {
      color: rgba(255, 255, 255, 0.8);
      background: none;
      transform: none;
      box-shadow: none;
    }

    .debug-section {
      display: none;
      margin-top: 12px;
    }

    .debug-section.visible {
      display: block;
    }

    .debug-block pre {
      scrollbar-width: thin;
    }

    .debug-block {
      background: rgba(0, 0, 0, 0.25);
      border-radius: 8px;
      padding: 14px;
      margin-bottom: 12px;
    }

    .debug-block h4 {
      margin: 0 0 8px 0;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      opacity: 0.7;
    }

    .debug-block pre {
      margin: 0;
      font-size: 11px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 300px;
      overflow-y: auto;
      opacity: 0.85;
    }
  </style>
</head>

<body>
  <h2>✨ AI Tab Grouping Proposal</h2>
  <div id="actionsContainer" class="actions" style="display: none;">
    <button class="confirm" id="applyButton">✅ Apply</button>
    <button class="cancel" id="cancelButton">Cancel</button>
  </div>
  <div id="content">
    <div class="loading">Loading proposal...</div>
  </div>
  <button class="debug-toggle" id="debugToggle">Show raw model I/O</button>
  <div class="debug-section" id="debugSection"></div>
  <script src="ai-proposal.js"></script>
</body>

</html>
