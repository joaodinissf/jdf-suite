name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'
    - name: Install uv
      uses: astral-sh/setup-uv@v7
    - name: Run unit tests
      run: uv run --extra dev pytest tests/test_generate.py -v
  integration-precommit:
    name: Integration test (pre-commit)
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'
    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '20'
    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy
    - name: Set up Java
      uses: actions/setup-java@v5
      with:
        distribution: temurin
        java-version: '21'
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y shfmt
    - name: Install uv
      uses: astral-sh/setup-uv@v7
    - name: Run pre-commit integration test
      run: uv run python tests/integration/test_precommit.py
  integration-lefthook:
    name: Integration test (lefthook)
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'
    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '20'
    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy
    - name: Set up Java
      uses: actions/setup-java@v5
      with:
        distribution: temurin
        java-version: '21'
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y shfmt
    - name: Install lefthook
      run: npm install -g lefthook
    - name: Install uv
      uses: astral-sh/setup-uv@v7
    - name: Install Python tools
      run: uv tool install pycln && uv tool install isort && uv tool install ruff && uv tool install pyright && uv tool install ty && uv tool install yamlfix && uv tool install sqlfluff
    - name: Install Node tools
      run: npm install -g prettier markdownlint-cli
    - name: Install Rust tools
      run: cargo install taplo-cli
    - name: Run lefthook integration test
      run: uv run python tests/integration/test_lefthook.py
  validate-config:
    name: Validate lefthook config
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Install lefthook
      run: npm install -g lefthook
    - name: Validate lefthook.yml
      run: lefthook dump
