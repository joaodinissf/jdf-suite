# ============================================================================
# PROJECT-SPECIFIC PRE-COMMIT CONFIGURATION
# ============================================================================
# This is the CI hooks config for the sensible-hooks project itself.
# For the multi-language template library, see src/sensible_hooks/templates/
# ============================================================================
repos:
# ============================================================================
# PYTHON
# ============================================================================
- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: v0.15.5
  hooks:
  - id: ruff-format
    name: ruff format
    entry: ruff format --force-exclude
    language: python
    types_or: [python, pyi]
    args: []
    require_serial: true
  - id: ruff-check
    name: ruff check
    entry: ruff check --force-exclude
    language: python
    types_or: [python, pyi]
    args: []
    require_serial: true
# ============================================================================
# PYTHON TYPE CHECKING
# ============================================================================
- repo: local
  hooks:
  - id: pyright
    name: pyright
    entry: pyright
    language: system
    types: [python]
    pass_filenames: true
  - id: ty
    name: ty (experimental type checker)
    entry: ty check
    language: system
    types: [python]
    pass_filenames: true
# ============================================================================
# GENERAL FILE CHECKS
# ============================================================================
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v6.0.0
  hooks:
  - id: check-yaml
  - id: end-of-file-fixer
  - id: trailing-whitespace
    exclude: \.(md|markdown)$
  - id: mixed-line-ending
    args: [--fix=lf]
  - id: check-added-large-files
    args: [--maxkb=1000]
