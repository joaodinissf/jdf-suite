# ============================================================================
# PYTHON TYPE CHECKING
# ============================================================================
  - group:
      parallel: true
      jobs:
      - name: ruff-check
        run: ruff check --force-exclude {staged_files}
        glob: '*.{py,pyi}'
      - name: pyright
        run: pyright {staged_files}
        glob: '*.py'
      - name: ty
        run: ty check {staged_files}
        glob: '*.py'
