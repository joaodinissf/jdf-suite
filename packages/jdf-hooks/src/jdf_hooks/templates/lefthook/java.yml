# ============================================================================
# JAVA
# ============================================================================
  - group:
      parallel: true
      jobs:
      # Java formatting (google-java-format) temporarily removed — see
      # https://github.com/joaodinissf/jdf-suite/issues/4 for the tracking
      # issue on reimplementing it without the git submodule dependency.
      - name: pmd
        run: pmd check -d {staged_files} --no-cache
        glob: '*.java'
      - name: cpd
        run: cpd --minimum-tokens 50 --files {staged_files}
        glob: '*.java'
      - name: checkstyle
        run: checkstyle -c configs/java/google_checks.xml {staged_files}
        glob: '*.java'
