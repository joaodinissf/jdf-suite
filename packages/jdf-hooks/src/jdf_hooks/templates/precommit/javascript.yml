# ============================================================================
# JAVASCRIPT/TYPESCRIPT/WEB
# ============================================================================
- repo: local
  hooks:
  - id: prettier
    name: prettier (JS/TS/JSON/CSS/etc.)
    entry: bash -lc 'npx prettier --ignore-unknown --write "$@"'
    language: system
    pass_filenames: true
    types_or:
    - astro
    - javascript
    - jsx
    - ts
    - tsx
    - json
    - css
    - scss
