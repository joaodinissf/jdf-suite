# ============================================================================
# MARKDOWN
# ============================================================================
- repo: https://github.com/igorshubovych/markdownlint-cli
  rev: v0.48.0
  hooks:
  - id: markdownlint-fix
    name: markdownlint-fix
    description: Fixes the style of Markdown/Commonmark files
    entry: markdownlint --fix --config configs/markdown/markdownlint.json
    language: node
    types:
    - markdown
