# ============================================================================
# JAVA
# ============================================================================
# Uses system-installed tools for consistency with lefthook
- repo: local
  hooks:
  # Java formatting (google-java-format) temporarily removed — see
  # https://github.com/joaodinissf/jdf-suite/issues/4 for the tracking
  # issue on reimplementing it without the git submodule dependency.
  - id: pmd
    name: PMD
    entry: pmd check --no-cache -d
    language: system
    types: [java]
    pass_filenames: true
  - id: cpd
    name: CPD (Copy-Paste Detector)
    entry: cpd --minimum-tokens 50 --files
    language: system
    types: [java]
    pass_filenames: true
  - id: checkstyle
    name: Checkstyle
    entry: checkstyle -c configs/java/google_checks.xml
    language: system
    types: [java]
    pass_filenames: true

# ALTERNATIVE: Unofficial Java tools wrapper (uses Docker for PMD/Checkstyle)
# Uncomment to use wrapper instead of system tools
# - repo: https://github.com/gherynos/pre-commit-java
