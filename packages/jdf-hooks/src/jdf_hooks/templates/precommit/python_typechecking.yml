#   - id: pyright

# ALTERNATIVE: mypy (stable type checker)
# Uncomment to use mypy instead of/in addition to pyright
# - repo: https://github.com/pre-commit/mirrors-mypy
#   rev: v1.18.2
#   hooks:
#   - id: mypy
#     types: [python]

# NOTE: pylint removed - ruff-check provides equivalent linting
